name: Déployer sur GitHub Pages

on:
  push:
    branches: [claude/expert-isolation-site-lxsk19, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configurer Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Téléverser le site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Déployer
        id: deployment
        uses: actions/deploy-pages@v4
